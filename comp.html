  <body>
    <style>
      .component--wapper {
        display: flex;
        flex-direction: column;
        gap: 120px;
        padding: 100px 0;
        background-color: #000000;
        overflow: hidden;
      }

      .component--item {
        border: 1px solid #000000;
        padding: 50px 0;
        background-color: #bbbbbb;
      }

      .component--title {
        font-size: 20px;
        font-weight: bold;
        padding: 30px;
        border-bottom: 1px dotted #000000;
        margin: 0 0 30px 40px;
        width: fit-content;
      }

      .component--main {
        padding: 60px 0px;
        border: 1px solid #000000;
        background-color: rgb(210, 210, 210);
      }
    </style>

    <div class="component--wapper">
      <!-- 詳しく見るボタン -->
      <div class="component--item">
        <div class="component--title">detail-btn</div>
        <div class="component--main">
          <!-- component -->
          <a href="#" class="detail-btn"><button>詳しく見る</button></a>
          <!-- component end -->
        </div>
      </div>
    </div>

    <!-- タイトル -->
    <div class="component--item">
      <div class="component--title">title</div>
      <div class="component--main">
        <!-- component -->
        <div class="section-title">
          <div class="text-box">
            <img class="sec-title-img pc" src="assets/img/title.png" alt="" />
            <img
              class="sec-title-img sp"
              src="assets/img/title-sp.png"
              alt=""
            />
            <div class="title-text">
              <h1>ABOUT</h1>
              <p>会社概要</p>
            </div>
          </div>
          <img class="sec-mv-img" src="assets/img/mv3.png" alt="" />
        </div>
        <!-- component end -->
      </div>
    </div>

    <!-- サブタイトル -->
    <div class="component--item">
      <div class="component--title">sub-title</div>
      <div class="component--main">
        <!-- component -->
        <div class="section-sub-title">
          <p>/ Company Information</p>
          <h2>会社概要</h2>
        </div>
        <!-- component end -->
      </div>
    </div>

    <script
      src="https://code.jquery.com/jquery-3.7.0.min.js"
      integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g="
      crossorigin="anonymous"
    ></script>

    <script src="js/script-02.js"></script>
